
#World of Wonders structure generation settings. Spacing and separation are measured in chunks. Larger spacing means rarer structures. Separation must stay lower than spacing; if not, the generated datapack clamps it safely.
[structures]

	[structures.acidic_pickaxe]
		#Set to false to disable this structure set.
		enabled = true
		#Average distance between placement attempts in chunks. Higher values make this structure rarer.
		#Range: 1 ~ 4096
		spacing = 130
		#Minimum chunk separation between placement attempts. Must be lower than spacing.
		#Range: 0 ~ 4095
		separation = 10

	[structures.brokencastle]
